<footer id="footer">
  <div class="back-to-top">
    <a href="#about-me">
      <span class="triangle-to-top"></span>
    </a>
  </div>

  <div class="toggables">
    <div class="comic-sans-sify">
      <switch [active]="globalService.comicSansSify" (click)="globalService.toggleComicSansSify()"></switch> ComicSans<strong>sify</strong>
    </div>
  </div>

  <div class="user-links" id="user-links">
    <ul>
      @for (link of userLinks; track link.label) {
        <li>
          @if (link?.url) {
            <a target="_blank" [href]="link.url" [title]="link.title">
              <fa-icon [icon]="link.faIcon"></fa-icon>
              <span>{{link.label}}</span>
            </a>
          } @else if (link?.copyText) {
            <a (click)="copyToClipboard(link.copyText!)" [title]="link.title">
              <fa-icon [icon]="link.faIcon"></fa-icon>
              <span>{{link.label}}</span>
            </a>
          }
        </li>
      }
    </ul>
  </div>
  <div class="version">v{{ version }}</div>
</footer>
